{% extends "base.html" %}

{% block content %}
  <div class="max-w-md mx-auto bg-slate-900 rounded-xl p-6 border border-slate-800">
    <h1 class="text-lg font-semibold mb-4">Login</h1>
    <form action="/login" method="post" class="space-y-3">
      <div>
        <label class="block text-sm text-slate-300">Email</label>
        <input name="email" type="email" required class="mt-1 w-full rounded-md bg-slate-950 border border-slate-800 px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm text-slate-300">Password</label>
        <input name="password" type="password" required class="mt-1 w-full rounded-md bg-slate-950 border border-slate-800 px-3 py-2" />
      </div>
      <button type="submit" class="w-full rounded-md bg-indigo-600 hover:bg-indigo-500 px-3 py-2 font-medium">Sign in</button>
    </form>
    <div class="mt-4 text-sm text-slate-400">
      Create an account via API first: <span class="text-slate-200">POST /api/auth/register</span>
    </div>
  </div>
{% endblock %}
