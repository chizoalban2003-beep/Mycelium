{% extends "base.html" %}

{% block content %}
  <div class="max-w-xl mx-auto rounded-xl border border-cyan-900/60 bg-gradient-to-br from-slate-900 via-slate-900 to-cyan-950/50 p-6">
    <div class="text-xs uppercase tracking-[0.25em] text-cyan-300/80">Recovery channel</div>
    <h1 class="mt-2 text-2xl font-semibold leading-tight">Set a new password</h1>
    <p class="mt-3 text-sm text-slate-300">
      This one-time link lets you restore access to your main-brain identity.
    </p>

    {% if error %}
      <div class="mt-4 rounded-md border border-rose-800/80 bg-rose-950/30 px-3 py-2 text-sm text-rose-200">{{ error }}</div>
    {% endif %}
    {% if notice %}
      <div class="mt-4 rounded-md border border-cyan-800/80 bg-cyan-950/30 px-3 py-2 text-sm text-cyan-200">{{ notice }}</div>
    {% endif %}

    <form action="/reset-password/{{ token }}" method="post" class="mt-5 space-y-3">
      <div>
        <label class="block text-sm text-slate-300">New password</label>
        <input name="new_password" type="password" autocomplete="new-password" minlength="6" required class="mt-1 w-full rounded-md bg-slate-950 border border-slate-800 px-3 py-2" />
      </div>
      <button type="submit" class="w-full rounded-md bg-cyan-700 hover:bg-cyan-600 px-3 py-2 font-medium">Restore access</button>
    </form>
  </div>
{% endblock %}
