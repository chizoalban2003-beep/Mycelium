<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
          <a href="/projects" class="text-xl font-semibold">{{ app_name }}</a>
          {% if user %}
            <a href="/predict" class="text-sm text-slate-300 hover:text-white">Predict</a>
            <a href="/curiosity" class="text-sm text-slate-300 hover:text-white">Curiosity</a>
            <span id="identityBadge" class="text-xs px-2 py-1 rounded bg-slate-800 text-slate-200 border border-slate-700"></span>
          {% endif %}
        </div>
        {% if user %}
          <form action="/logout" method="post">
            <button class="text-sm text-slate-300 hover:text-white" type="submit">Logout</button>
          </form>
        {% endif %}
      </div>

      {% if user %}
      <div id="nudgeBanner" class="hidden mb-6 rounded border border-slate-800 bg-slate-900 p-4">
        <div class="flex items-start justify-between gap-4">
          <div>
            <div id="nudgeTitle" class="font-semibold text-slate-100"></div>
            <div id="nudgeMessage" class="text-sm text-slate-300 mt-1"></div>
          </div>
          <button id="nudgeDismiss" class="text-sm text-slate-300 hover:text-white">Dismiss</button>
        </div>
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </div>

    {% if user %}
    <script>
      async function loadIdentityBadge() {
        const el = document.getElementById('identityBadge');
        if (!el) return;
        try {
          const r = await fetch('/api/nexus/identity/presentation', { credentials: 'same-origin' });
          if (!r.ok) return;
          const data = await r.json();
          if (!data || !data.display_name) return;
          el.textContent = `${data.display_name} • ${data.mood}`;
        } catch (e) {
          return;
        }
      }

      async function loadNudgeBanner() {
        const banner = document.getElementById('nudgeBanner');
        const titleEl = document.getElementById('nudgeTitle');
        const msgEl = document.getElementById('nudgeMessage');
        const dismissBtn = document.getElementById('nudgeDismiss');
        if (!banner || !titleEl || !msgEl || !dismissBtn) return;

        try {
          const r = await fetch('/api/nexus/nudges/recent?limit=1&unseen_only=true', { credentials: 'same-origin' });
          if (!r.ok) return;
          const data = await r.json();
          const n = (data && data.nudges && data.nudges.length) ? data.nudges[0] : null;
          if (!n) return;

          titleEl.textContent = n.title || 'Nudge';
          msgEl.textContent = n.message || '';
          banner.classList.remove('hidden');

          dismissBtn.onclick = async () => {
            try {
              await fetch('/api/nexus/nudges/ack', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nudge_id: n.id })
              });
            } catch (e) {}
            banner.classList.add('hidden');
          };
        } catch (e) {
          return;
        }
      }

      loadIdentityBadge();
      loadNudgeBanner();
    </script>
    {% endif %}
  </body>
</html>
