<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 bg-[radial-gradient(circle_at_10%_10%,rgba(34,211,238,0.10),transparent_30%),radial-gradient(circle_at_85%_15%,rgba(129,140,248,0.08),transparent_35%)]">
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
          <div>
            <a href="/projects" class="text-xl font-semibold tracking-wide">{{ app_name }}</a>
            <div class="text-[11px] uppercase tracking-[0.25em] text-cyan-300/90">{{ system_motto }}</div>
          </div>
          {% if user %}
            <a href="/demo" class="text-sm text-cyan-300 hover:text-cyan-200">Demo</a>
            <a href="/assistant/profile" class="text-sm text-slate-300 hover:text-white">Assistant</a>
            <a href="/chat" class="text-sm text-slate-300 hover:text-white">Chat</a>
            <a href="/predict" class="text-sm text-slate-300 hover:text-white">Predict</a>
            <a href="/curiosity" class="text-sm text-slate-300 hover:text-white">Curiosity</a>
            <a href="/knowledge" class="text-sm text-slate-300 hover:text-white">Knowledge</a>
            <a href="/hive/health" class="text-sm text-slate-300 hover:text-white">Hive Health</a>
            <span id="identityBadge" class="text-xs px-2 py-1 rounded bg-slate-800 text-slate-200 border border-slate-700"></span>
          {% endif %}
        </div>
        {% if user %}
          <form action="/logout" method="post">
            <button class="text-sm text-slate-300 hover:text-white" type="submit">Logout</button>
          </form>
        {% endif %}
      </div>

      {% if user %}
      <div id="nudgeBanner" class="hidden mb-6 rounded border border-slate-800 bg-slate-900 p-4">
        <div class="flex items-start justify-between gap-4">
          <div>
            <div id="nudgeTitle" class="font-semibold text-slate-100"></div>
            <div id="nudgeMessage" class="text-sm text-slate-300 mt-1"></div>
            <div id="nudgeActions" class="hidden mt-3"></div>
            <div id="nudgeHints" class="hidden mt-3"></div>
            <div id="nudgeHintStatus" class="hidden mt-2 text-xs text-slate-400"></div>
          </div>
          <button id="nudgeDismiss" class="text-sm text-slate-300 hover:text-white">Dismiss</button>
        </div>
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </div>

    {% if user %}
    <script>
      // Register a minimal service worker so Android can install this as an app.
      (function registerSW() {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(() => {});
          }
        } catch (e) {}
      })();

      // Best-effort: request notification permission once.
      (function maybeAskNotif() {
        try {
          if (!('Notification' in window)) return;
          if (Notification.permission !== 'default') return;
          // Only prompt on a real user session.
          Notification.requestPermission().catch(() => {});
        } catch (e) {}
      })();

      async function loadIdentityBadge() {
        const el = document.getElementById('identityBadge');
        if (!el) return;
        try {
          const r = await fetch('/api/nexus/identity/presentation', { credentials: 'same-origin' });
          if (!r.ok) return;
          const data = await r.json();
          if (!data || !data.display_name) return;
          el.textContent = `${data.display_name} • ${data.mood}`;
        } catch (e) {
          return;
        }
      }

      async function loadNudgeBanner() {
        const banner = document.getElementById('nudgeBanner');
        const titleEl = document.getElementById('nudgeTitle');
        const msgEl = document.getElementById('nudgeMessage');
        const actionsEl = document.getElementById('nudgeActions');
        const hintsEl = document.getElementById('nudgeHints');
        const statusEl = document.getElementById('nudgeHintStatus');
        const dismissBtn = document.getElementById('nudgeDismiss');
        if (!banner || !titleEl || !msgEl || !actionsEl || !dismissBtn || !hintsEl || !statusEl) return;

        try {
          const r = await fetch('/api/nexus/nudges/recent?limit=1&unseen_only=true', { credentials: 'same-origin' });
          if (!r.ok) return;
          const data = await r.json();
          const n = (data && data.nudges && data.nudges.length) ? data.nudges[0] : null;
          if (!n) return;

          // Optional: show a local OS notification (works when the page is open).
          try {
            if ('Notification' in window && Notification.permission === 'granted') {
              const last = localStorage.getItem('lastNotifiedNudgeId');
              if (String(last || '') !== String(n.id || '')) {
                new Notification(n.title || 'Nudge', { body: n.message || '' });
                localStorage.setItem('lastNotifiedNudgeId', String(n.id || ''));
              }
            }
          } catch (e) {}

          titleEl.textContent = n.title || 'Nudge';
          msgEl.textContent = n.message || '';

          // Render any Hive hints (curiosity tags) with confirm/correct actions.
          const hints = (n.payload && Array.isArray(n.payload.curiosity_hints)) ? n.payload.curiosity_hints : [];
          const actions = (n.payload && Array.isArray(n.payload.actions)) ? n.payload.actions : [];
          actionsEl.innerHTML = '';
          actionsEl.classList.add('hidden');
          hintsEl.innerHTML = '';
          hintsEl.classList.add('hidden');
          statusEl.textContent = '';
          statusEl.classList.add('hidden');

          if (actions.length) {
            const header = document.createElement('div');
            header.className = 'text-xs text-slate-400';
            header.textContent = 'Assistant actions:';
            actionsEl.appendChild(header);

            actions.slice(0, 4).forEach((a) => {
              const actionId = String((a && a.action_id) || '').slice(0, 64);
              if (!actionId) return;

              const row = document.createElement('div');
              row.className = 'mt-2 flex flex-wrap items-center gap-2';

              const label = document.createElement('span');
              label.className = 'text-xs px-2 py-1 rounded bg-slate-800 text-slate-200 border border-slate-700';
              label.textContent = String((a && a.title) || actionId).slice(0, 72);
              row.appendChild(label);

              const btnApprove = document.createElement('button');
              btnApprove.className = 'text-xs px-2 py-1 rounded bg-emerald-900/50 hover:bg-emerald-800/60 border border-emerald-700';
              btnApprove.textContent = 'Approve';

              const btnReject = document.createElement('button');
              btnReject.className = 'text-xs px-2 py-1 rounded bg-rose-900/40 hover:bg-rose-800/50 border border-rose-700';
              btnReject.textContent = 'Reject';

              async function runAction(decision) {
                btnApprove.disabled = true;
                btnReject.disabled = true;
                statusEl.textContent = '';
                statusEl.classList.add('hidden');
                try {
                  const r3 = await fetch('/api/nexus/telemetry/assistant/action', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      nudge_id: n.id,
                      action_id: actionId,
                      decision: String(decision || 'approve')
                    })
                  });
                  const d3 = await r3.json().catch(() => ({}));
                  if (!r3.ok) {
                    statusEl.textContent = (d3 && d3.detail) ? String(d3.detail) : 'Action failed.';
                    statusEl.classList.remove('hidden');
                    return;
                  }
                  statusEl.textContent = String((d3 && d3.detail) || 'Action recorded.');
                  statusEl.classList.remove('hidden');
                  await loadNudgeBanner();
                } catch (e) {
                  statusEl.textContent = 'Action failed.';
                  statusEl.classList.remove('hidden');
                } finally {
                  btnApprove.disabled = false;
                  btnReject.disabled = false;
                }
              }

              btnApprove.onclick = () => runAction('approve');
              btnReject.onclick = () => runAction('reject');
              row.appendChild(btnApprove);
              row.appendChild(btnReject);

              actionsEl.appendChild(row);
            });

            actionsEl.classList.remove('hidden');
          }

          if (hints.length) {
            const header = document.createElement('div');
            header.className = 'text-xs text-slate-400';
            header.textContent = 'Hive hints (confirm or correct):';
            hintsEl.appendChild(header);

            hints.slice(0, 6).forEach((hintTag) => {
              const row = document.createElement('div');
              row.className = 'mt-2 flex flex-wrap items-center gap-2';

              const tag = document.createElement('span');
              tag.className = 'text-xs px-2 py-1 rounded bg-slate-800 text-slate-200 border border-slate-700';
              tag.textContent = String(hintTag || '').slice(0, 64);
              row.appendChild(tag);

              const input = document.createElement('input');
              input.type = 'text';
              input.value = String(hintTag || '').slice(0, 120);
              input.placeholder = 'Concept (e.g., Rust programming)';
              input.className = 'text-sm bg-slate-950 border border-slate-700 rounded px-2 py-1 text-slate-100 w-64';
              row.appendChild(input);

              const shareWrap = document.createElement('label');
              shareWrap.className = 'text-xs text-slate-400 flex items-center gap-1 select-none';
              const share = document.createElement('input');
              share.type = 'checkbox';
              share.className = 'accent-slate-300';
              share.checked = false;
              shareWrap.appendChild(share);
              const shareTxt = document.createElement('span');
              shareTxt.textContent = 'Share to Hive';
              shareWrap.appendChild(shareTxt);
              row.appendChild(shareWrap);

              async function sendFeedback(action) {
                statusEl.textContent = '';
                statusEl.classList.add('hidden');

                const concept = (input.value || '').trim();
                if (!concept) {
                  statusEl.textContent = 'Please enter a concept.';
                  statusEl.classList.remove('hidden');
                  return;
                }

                btnConfirm.disabled = true;
                btnCorrect.disabled = true;
                try {
                  const r2 = await fetch('/api/nexus/feedback/ionize', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      project_id: n.project_id || null,
                      nudge_id: n.id,
                      hint_tag: String(hintTag || ''),
                      action: String(action || 'confirm'),
                      concept_text: concept,
                      export_to_hive: !!share.checked,
                    })
                  });
                  const data2 = await r2.json().catch(() => ({}));
                  if (!r2.ok) {
                    statusEl.textContent = (data2 && data2.detail) ? String(data2.detail) : 'Failed to save feedback.';
                    statusEl.classList.remove('hidden');
                    return;
                  }
                  if (!!share.checked) {
                    if (data2.exported_to_hive) {
                      const anon = data2.export_redacted ? ' (shared • anonymized)' : ' (shared)';
                      statusEl.textContent = `Saved${anon}.`;
                    } else {
                      const reason = String(data2.export_reason || 'not_exported');
                      if (reason === 'export_disabled_by_policy') {
                        statusEl.textContent = 'Saved locally. Hive sharing is disabled by parental policy.';
                      } else if (reason === 'hive_disabled') {
                        statusEl.textContent = 'Saved locally. Hive is disabled in settings.';
                      } else if (reason === 'blocked_by_privacy_membrane') {
                        statusEl.textContent = 'Saved locally. Export blocked by privacy membrane.';
                      } else {
                        statusEl.textContent = 'Saved locally. Export failed.';
                      }
                    }
                  } else {
                    statusEl.textContent = 'Saved locally.';
                  }
                  statusEl.classList.remove('hidden');
                } catch (e) {
                  statusEl.textContent = 'Failed to save feedback.';
                  statusEl.classList.remove('hidden');
                } finally {
                  btnConfirm.disabled = false;
                  btnCorrect.disabled = false;
                }
              }

              const btnConfirm = document.createElement('button');
              btnConfirm.className = 'text-xs px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 border border-slate-700';
              btnConfirm.textContent = 'Confirm';
              btnConfirm.onclick = () => sendFeedback('confirm');
              row.appendChild(btnConfirm);

              const btnCorrect = document.createElement('button');
              btnCorrect.className = 'text-xs px-2 py-1 rounded bg-slate-800 hover:bg-slate-700 border border-slate-700';
              btnCorrect.textContent = 'Correct';
              btnCorrect.onclick = () => sendFeedback('correct');
              row.appendChild(btnCorrect);

              hintsEl.appendChild(row);
            });

            hintsEl.classList.remove('hidden');
          }

          banner.classList.remove('hidden');

          dismissBtn.onclick = async () => {
            try {
              await fetch('/api/nexus/nudges/ack', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nudge_id: n.id })
              });
            } catch (e) {}
            banner.classList.add('hidden');
          };
        } catch (e) {
          return;
        }
      }

      loadIdentityBadge();
      loadNudgeBanner();
      // Poll nudges periodically so the assistant feels alive.
      setInterval(loadNudgeBanner, 20000);
    </script>
    {% endif %}
  </body>
</html>
