{% extends "base.html" %}

{% block content %}
<div class="space-y-3">

  <!-- Agent narrative bar (touch-friendly, large tap targets) -->
  <div id="agentBar" class="rounded-xl border border-cyan-900/60 bg-gradient-to-r from-slate-900 via-slate-900 to-cyan-950/30 px-4 py-3 flex items-center gap-3">
    <div id="agentAvatar" class="w-14 h-14 rounded-full border-2 border-cyan-400/50 flex items-center justify-center text-3xl bg-slate-800 shrink-0 transition-all duration-700"></div>
    <div class="min-w-0 flex-1">
      <div class="flex items-center gap-2 flex-wrap">
        <span id="agentName" class="font-bold text-slate-100 text-lg">Myco</span>
        <span id="agentStageBadge" class="text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 text-slate-400"></span>
        <span id="agentMood" class="text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full bg-cyan-950 border border-cyan-900 text-cyan-300"></span>
      </div>
      <div id="agentSpeech" class="text-sm text-slate-300 mt-0.5 line-clamp-2"></div>
    </div>
    <div class="text-right shrink-0">
      <div id="signalCounter" class="text-2xl font-bold text-cyan-300">0</div>
      <div class="text-[9px] text-slate-500 uppercase tracking-wide">signals</div>
    </div>
  </div>

  <!-- 3D Ecosystem Canvas -->
  <div id="sceneContainer" class="rounded-xl border border-slate-800 bg-black relative overflow-hidden" style="height: 520px; touch-action: pan-y;">
    <canvas id="threeCanvas" class="w-full h-full"></canvas>
    <!-- Signal feed overlay -->
    <div id="signalFeed" class="absolute top-2 right-2 w-52 max-h-44 overflow-hidden pointer-events-none space-y-0.5">
    </div>
    <!-- Layer labels -->
    <div class="absolute left-3 top-3 pointer-events-none">
      <div class="text-[10px] uppercase tracking-widest text-rose-400/60 font-medium">Changing Signals</div>
    </div>
    <div class="absolute left-3 pointer-events-none" style="top: 38%;">
      <div class="text-[10px] uppercase tracking-widest text-cyan-400/60 font-medium">Active Patterns</div>
    </div>
    <div class="absolute left-3 pointer-events-none" style="top: 72%;">
      <div class="text-[10px] uppercase tracking-widest text-emerald-400/60 font-medium">Foundation</div>
    </div>
    <!-- Tap hint -->
    <div id="tapHint" class="absolute bottom-3 left-1/2 -translate-x-1/2 text-xs text-slate-500/60 pointer-events-none transition-opacity duration-1000">Drag to rotate · Pinch to zoom</div>
  </div>

  <!-- Touch-friendly controls -->
  <div class="flex items-center gap-2 flex-wrap">
    <button id="btnCollectLive" class="rounded-full bg-emerald-700 px-5 py-2.5 text-sm font-medium text-white hover:bg-emerald-600 active:scale-95 transition-transform">
      Collect Signals
    </button>
    <button id="btnLearnLive" class="rounded-full bg-indigo-600 px-5 py-2.5 text-sm font-medium text-white hover:bg-indigo-500 active:scale-95 transition-transform">
      Learn
    </button>
    <label class="flex items-center gap-1.5 text-xs text-slate-400 select-none ml-auto">
      <input type="checkbox" id="autoCollect" checked class="accent-cyan-400 w-4 h-4" /> Auto-collect
    </label>
    <span id="liveStatus" class="text-xs text-slate-500"></span>
  </div>

  <!-- Layer summary cards (touch-friendly, large) -->
  <div class="grid grid-cols-3 gap-2">
    <div class="rounded-xl border border-emerald-900/50 bg-emerald-950/15 p-3 text-center">
      <div class="text-[10px] uppercase tracking-widest text-emerald-300/70">Foundation</div>
      <div id="bedrockCount" class="text-xl font-bold text-emerald-300 mt-0.5">0</div>
      <div id="bedrockList" class="text-[10px] text-slate-400 mt-1 line-clamp-2"></div>
    </div>
    <div class="rounded-xl border border-cyan-900/50 bg-cyan-950/15 p-3 text-center">
      <div class="text-[10px] uppercase tracking-widest text-cyan-300/70">Active</div>
      <div id="suspensionCount" class="text-xl font-bold text-cyan-300 mt-0.5">0</div>
      <div id="suspensionList" class="text-[10px] text-slate-400 mt-1 line-clamp-2"></div>
    </div>
    <div class="rounded-xl border border-rose-900/50 bg-rose-950/15 p-3 text-center">
      <div class="text-[10px] uppercase tracking-widest text-rose-300/70">Changing</div>
      <div id="turbulentCount" class="text-xl font-bold text-rose-300 mt-0.5">0</div>
      <div id="turbulentList" class="text-[10px] text-slate-400 mt-1 line-clamp-2"></div>
    </div>
  </div>

  <!-- Chat panel (touch-friendly) -->
  <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
    <div class="text-xs uppercase tracking-[0.2em] text-cyan-300/80 mb-2">Talk to your companion</div>
    <div id="chatMessages" class="h-36 overflow-y-auto rounded-lg bg-slate-950 border border-slate-800 p-3 space-y-2 text-sm"></div>
    <form id="chatForm" class="mt-2 flex gap-2">
      <input id="chatInput" type="text" placeholder="Type a message…" autocomplete="off"
             class="flex-1 rounded-full bg-slate-950 border border-slate-800 px-4 py-2.5 text-sm text-slate-100" />
      <button type="submit" class="rounded-full bg-cyan-700 hover:bg-cyan-600 active:scale-95 px-5 py-2.5 text-sm font-medium text-white transition-transform">Send</button>
    </form>
  </div>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // --- Three.js 3D Ecosystem ---
  const container = document.getElementById('sceneContainer');
  const canvas = document.getElementById('threeCanvas');
  let W = container.clientWidth, H = container.clientHeight;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020617);
  scene.fog = new THREE.FogExp2(0x020617, 0.003);

  const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 1000);
  camera.position.set(0, 30, 80);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  // Lighting
  const ambientLight = new THREE.AmbientLight(0x334155, 0.6);
  scene.add(ambientLight);
  const topLight = new THREE.DirectionalLight(0x22d3ee, 0.4);
  topLight.position.set(0, 50, 30);
  scene.add(topLight);
  const bottomLight = new THREE.PointLight(0x059669, 0.3, 100);
  bottomLight.position.set(0, -30, 0);
  scene.add(bottomLight);

  // Layer planes (transparent platforms)
  function createLayerPlane(y, color, opacity) {
    const geo = new THREE.PlaneGeometry(120, 120);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = y;
    scene.add(mesh);
    return mesh;
  }
  createLayerPlane(20, 0xe11d48, 0.04);   // Turbulent
  createLayerPlane(0, 0x0891b2, 0.05);    // Suspension
  createLayerPlane(-20, 0x059669, 0.06);   // Bedrock

  // Grid helper
  const grid = new THREE.GridHelper(120, 30, 0x1e293b, 0x0f172a);
  grid.position.y = -25;
  scene.add(grid);

  // Feature node meshes
  let featureNodes = [];
  const layerY = { bedrock: -18, suspension: 2, turbulent: 22 };
  const layerHex = { bedrock: 0x059669, suspension: 0x0891b2, turbulent: 0xe11d48 };

  function updateFeatureNodes(features) {
    // Remove old
    featureNodes.forEach(n => { scene.remove(n.mesh); if (n.label) scene.remove(n.label); });
    featureNodes = [];
    if (!features || !features.length) return;

    features.forEach((f, i) => {
      const r = Math.max(0.4, Math.min(2.5, Math.sqrt(f.density || 1) * 0.3));
      const geo = new THREE.SphereGeometry(r, 16, 16);
      const color = layerHex[f.layer] || 0x64748b;
      const mat = new THREE.MeshPhongMaterial({
        color, transparent: true, opacity: 0.8,
        emissive: color, emissiveIntensity: 0.15,
      });
      const mesh = new THREE.Mesh(geo, mat);

      const baseY = layerY[f.layer] || 0;
      const angle = (i / features.length) * Math.PI * 2;
      const radius = 15 + Math.random() * 25;
      mesh.position.set(
        Math.cos(angle) * radius,
        baseY + (Math.random() - 0.5) * 8,
        Math.sin(angle) * radius,
      );

      mesh.userData = { feature: f.feature, layer: f.layer, depth: f.depth, targetY: baseY };
      scene.add(mesh);

      // Floating label using sprite
      const labelCanvas = document.createElement('canvas');
      labelCanvas.width = 256; labelCanvas.height = 48;
      const lctx = labelCanvas.getContext('2d');
      lctx.font = '18px sans-serif';
      lctx.fillStyle = '#e2e8f0';
      lctx.textAlign = 'center';
      lctx.fillText(f.feature.length > 18 ? f.feature.slice(0, 17) + '…' : f.feature, 128, 30);
      const tex = new THREE.CanvasTexture(labelCanvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.7 });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(mesh.position);
      sprite.position.y += r + 2;
      sprite.scale.set(8, 2, 1);
      scene.add(sprite);

      featureNodes.push({ mesh, label: sprite, data: f });
    });
  }

  // Link lines
  let linkLines = [];
  function updateLinks(graphLinks) {
    linkLines.forEach(l => scene.remove(l));
    linkLines = [];
    if (!graphLinks || !graphLinks.length) return;

    const nodeMap = {};
    featureNodes.forEach(n => { nodeMap[n.data.raw_feature || n.data.feature] = n.mesh.position; });

    graphLinks.forEach(l => {
      const a = nodeMap[l.source], b = nodeMap[l.target];
      if (!a || !b) return;
      const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
      const mat = new THREE.LineBasicMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.15 });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      linkLines.push(line);
    });
  }

  // Agent avatar (3D figure)
  let agentMesh;
  const stageScale = { infant: 1.0, toddler: 1.5, adolescent: 2.0 };
  const moodColors = {
    curious: 0x22d3ee, content: 0x34d399, agitated: 0xfb7185, focused: 0x818cf8,
  };
  let agentStage = 'infant', agentMood = 'curious', agentName = 'Myco';
  let agentTarget = new THREE.Vector3(0, 5, 0);

  function createAgent() {
    const group = new THREE.Group();

    // Body (capsule-like)
    const bodyGeo = new THREE.CapsuleGeometry(1.2, 2, 8, 16);
    const bodyMat = new THREE.MeshPhongMaterial({
      color: 0x0f172a, emissive: moodColors.curious, emissiveIntensity: 0.3,
      transparent: true, opacity: 0.9,
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    group.add(body);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.25, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x22d3ee });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.4, 0.8, 1.05);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.4, 0.8, 1.05);
    group.add(rightEye);

    // Glow sphere
    const glowGeo = new THREE.SphereGeometry(2.5, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({
      color: moodColors.curious, transparent: true, opacity: 0.08,
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    group.add(glow);

    group.position.set(0, 5, 0);
    scene.add(group);
    return { group, body, bodyMat, leftEye, rightEye, glow, glowMat, eyeMat };
  }
  agentMesh = createAgent();

  function updateAgentVisuals() {
    const s = stageScale[agentStage] || 1;
    agentMesh.group.scale.set(s, s, s);
    const mc = moodColors[agentMood] || moodColors.curious;
    agentMesh.bodyMat.emissive.setHex(mc);
    agentMesh.glowMat.color.setHex(mc);
    agentMesh.eyeMat.color.setHex(mc);
  }

  // Signal particles
  const particlePositions = [];
  const particleVelocities = [];
  const particleColors = [];
  const MAX_PARTICLES = 200;
  const pGeo = new THREE.BufferGeometry();
  const pPositions = new Float32Array(MAX_PARTICLES * 3);
  const pColors = new Float32Array(MAX_PARTICLES * 3);
  let particleCount = 0;

  pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
  const pMat = new THREE.PointsMaterial({ size: 0.5, vertexColors: true, transparent: true, opacity: 0.6 });
  const particleSystem = new THREE.Points(pGeo, pMat);
  scene.add(particleSystem);

  function spawnSignalParticle(layer) {
    if (particleCount >= MAX_PARTICLES) particleCount = 0;
    const i = particleCount * 3;
    const y = layerY[layer] || 0;
    pPositions[i] = (Math.random() - 0.5) * 80;
    pPositions[i + 1] = y + (Math.random() - 0.5) * 10;
    pPositions[i + 2] = (Math.random() - 0.5) * 80;
    const c = new THREE.Color(layerHex[layer] || 0x64748b);
    pColors[i] = c.r; pColors[i + 1] = c.g; pColors[i + 2] = c.b;
    particleCount++;
    pGeo.attributes.position.needsUpdate = true;
    pGeo.attributes.color.needsUpdate = true;
  }

  // Camera orbit (mouse/touch)
  let isDragging = false, prevX = 0, prevY = 0;
  let camTheta = 0, camPhi = 0.4, camDist = 80;

  container.addEventListener('pointerdown', (e) => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  container.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    camTheta -= (e.clientX - prevX) * 0.005;
    camPhi = Math.max(-0.8, Math.min(1.2, camPhi - (e.clientY - prevY) * 0.005));
    prevX = e.clientX; prevY = e.clientY;
  });
  container.addEventListener('pointerup', () => { isDragging = false; });
  container.addEventListener('wheel', (e) => {
    camDist = Math.max(30, Math.min(150, camDist + e.deltaY * 0.05));
  }, { passive: true });

  // Render loop
  let frame = 0;
  function animate() {
    requestAnimationFrame(animate);
    frame++;

    // Camera orbit
    if (!isDragging) camTheta += 0.001;
    camera.position.x = Math.sin(camTheta) * Math.cos(camPhi) * camDist;
    camera.position.y = Math.sin(camPhi) * camDist * 0.5 + 20;
    camera.position.z = Math.cos(camTheta) * Math.cos(camPhi) * camDist;
    camera.lookAt(0, 0, 0);

    // Agent movement (smooth toward target)
    const ag = agentMesh.group.position;
    ag.x += (agentTarget.x - ag.x) * 0.01;
    ag.y += (agentTarget.y - ag.y) * 0.01;
    ag.z += (agentTarget.z - ag.z) * 0.01;

    // Agent bob
    agentMesh.group.position.y += Math.sin(frame * 0.03) * 0.03;
    agentMesh.group.rotation.y += 0.005;

    // Glow pulse
    const pulse = 0.06 + Math.sin(frame * 0.04) * 0.03;
    agentMesh.glowMat.opacity = pulse;

    // Feature node gentle float
    featureNodes.forEach((n, i) => {
      n.mesh.position.y += Math.sin(frame * 0.02 + i) * 0.02;
      if (n.label) { n.label.position.x = n.mesh.position.x; n.label.position.y = n.mesh.position.y + 3; n.label.position.z = n.mesh.position.z; }
    });

    // Ambient particles
    if (frame % 20 === 0) {
      const layers = ['turbulent', 'suspension', 'bedrock'];
      spawnSignalParticle(layers[Math.floor(Math.random() * 3)]);
    }

    // Move particles slightly
    for (let i = 0; i < particleCount * 3; i += 3) {
      pPositions[i] += (Math.random() - 0.5) * 0.1;
      pPositions[i + 1] += (Math.random() - 0.5) * 0.05;
      pPositions[i + 2] += (Math.random() - 0.5) * 0.1;
    }
    pGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  }
  animate();

  // Hide tap hint after interaction
  container.addEventListener('pointerdown', () => {
    document.getElementById('tapHint').style.opacity = '0';
  }, { once: true });

  // Resize
  function onResize() {
    W = container.clientWidth; H = container.clientHeight;
    camera.aspect = W / H; camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  }
  window.addEventListener('resize', onResize);

  // --- Data polling ---
  let lastData = null;
  const stageEmoji = { infant: '🌱', toddler: '🌿', adolescent: '🌳' };

  async function fetchLive() {
    try {
      const r = await fetch('/api/ecosystem/live', { credentials: 'same-origin' });
      if (!r.ok) return;
      const data = await r.json();
      if (!data.ok) return;
      lastData = data;
      applyData(data);
    } catch (e) {}
  }

  function applyData(data) {
    const a = data.agent || {};
    agentName = a.given_name || 'Myco';
    agentStage = data.stage || 'infant';
    agentMood = a.mood || 'curious';

    document.getElementById('agentName').textContent = agentName;
    document.getElementById('agentStageBadge').textContent = agentStage;
    document.getElementById('agentMood').textContent = agentMood;
    document.getElementById('signalCounter').textContent = (data.summary || {}).n_signals || 0;
    document.getElementById('agentAvatar').textContent = stageEmoji[agentStage] || '🌱';

    const n = data.narrative || {};
    document.getElementById('agentSpeech').textContent = n.headline || '';

    updateAgentVisuals();

    // Update 3D nodes
    const sed = data.sedimentation;
    if (sed && sed.features) {
      updateFeatureNodes(sed.features);
      if (data.graph) updateLinks(data.graph.links || []);
    }

    // Move agent toward a bedrock node
    if (featureNodes.length > 0) {
      const bedrock = featureNodes.filter(n => n.data.layer === 'bedrock');
      const pick = bedrock.length ? bedrock[Math.floor(Math.random() * bedrock.length)] : featureNodes[0];
      agentTarget.set(pick.mesh.position.x, pick.mesh.position.y + 5, pick.mesh.position.z);
    }

    // Signal feed
    const feed = document.getElementById('signalFeed');
    feed.innerHTML = '';
    (data.live_signals || []).slice(0, 6).forEach(s => {
      const el = document.createElement('div');
      el.className = 'text-[10px] text-cyan-300/70 bg-slate-950/60 rounded px-1.5 py-0.5 backdrop-blur';
      el.textContent = '→ ' + s.type;
      feed.appendChild(el);
      spawnSignalParticle(['turbulent', 'suspension', 'bedrock'][Math.floor(Math.random() * 3)]);
    });

    // Layer panels
    const feats = (sed && sed.features) || [];
    const byLayer = { bedrock: [], suspension: [], turbulent: [] };
    feats.forEach(f => { if (byLayer[f.layer]) byLayer[f.layer].push(f.feature); });
    document.getElementById('bedrockCount').textContent = byLayer.bedrock.length;
    document.getElementById('suspensionCount').textContent = byLayer.suspension.length;
    document.getElementById('turbulentCount').textContent = byLayer.turbulent.length;
    document.getElementById('bedrockList').textContent = byLayer.bedrock.slice(0, 5).join(', ') || '—';
    document.getElementById('suspensionList').textContent = byLayer.suspension.slice(0, 5).join(', ') || '—';
    document.getElementById('turbulentList').textContent = byLayer.turbulent.slice(0, 5).join(', ') || '—';

    // Top apps in signal feed
    const apps = (data.summary || {}).top_apps || {};
    const appKeys = Object.keys(apps).slice(0, 5);
    if (appKeys.length) {
      const appsEl = document.createElement('div');
      appsEl.className = 'text-[9px] text-slate-500 mt-2 border-t border-slate-800/50 pt-1';
      appsEl.textContent = 'Active: ' + appKeys.join(', ');
      feed.appendChild(appsEl);
    }
  }

  fetchLive();
  setInterval(fetchLive, 5000);

  // Auto-collect
  setInterval(async () => {
    if (!document.getElementById('autoCollect').checked) return;
    try {
      await fetch('/api/ecosystem/collect', { method: 'POST', credentials: 'same-origin' });
      document.getElementById('liveStatus').textContent = new Date().toLocaleTimeString();
    } catch (e) {}
  }, 10000);

  document.getElementById('btnCollectLive').addEventListener('click', async () => {
    document.getElementById('liveStatus').textContent = 'collecting…';
    try {
      const r = await fetch('/api/ecosystem/collect', { method: 'POST', credentials: 'same-origin' });
      const d = await r.json();
      document.getElementById('liveStatus').textContent = d.signals_collected + ' signals';
      setTimeout(fetchLive, 300);
    } catch (e) { document.getElementById('liveStatus').textContent = 'error'; }
  });

  document.getElementById('btnLearnLive').addEventListener('click', async () => {
    document.getElementById('liveStatus').textContent = 'learning…';
    try {
      const r = await fetch('/api/ecosystem/learn', { method: 'POST', credentials: 'same-origin' });
      const d = await r.json();
      document.getElementById('liveStatus').textContent = d.ok ? 'learned!' : 'error';
      setTimeout(fetchLive, 300);
    } catch (e) { document.getElementById('liveStatus').textContent = 'error'; }
  });

  // --- Chat ---
  const chatForm = document.getElementById('chatForm');
  const chatInput = document.getElementById('chatInput');
  const chatMessages = document.getElementById('chatMessages');

  function addMsg(from, text, isAgent) {
    const el = document.createElement('div');
    el.className = 'rounded-lg px-3 py-1.5 text-sm max-w-[85%] ' + (isAgent ? 'bg-cyan-950/40 text-cyan-100 mr-auto' : 'bg-slate-800 text-slate-200 ml-auto');
    el.innerHTML = '<div class="text-[10px] text-slate-500 mb-0.5">' + from + '</div>' + text;
    chatMessages.appendChild(el);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = '';
    addMsg('You', msg, false);

    let reply = '';
    if (!lastData) {
      reply = "I'm still waking up. Give me a moment to observe your signals.";
    } else {
      const n = (lastData.summary || {}).n_signals || 0;
      const apps = Object.keys((lastData.summary || {}).top_apps || {}).slice(0, 3).join(', ');
      const narrative = lastData.narrative || {};
      const ml = msg.toLowerCase();

      if (ml.includes('who') && (ml.includes('you') || ml.includes('are'))) {
        reply = `I'm ${agentName}, your digital companion. I'm at the ${agentStage} stage, feeling ${agentMood}. I've seen ${n} signals from your device so far. ${narrative.next_step || ''}`;
      } else if (ml.includes('feel') || ml.includes('mood')) {
        reply = `I'm feeling ${agentMood} right now. ${narrative.insight || ''}`;
      } else if (ml.includes('app') || ml.includes('using') || ml.includes('open')) {
        reply = apps ? `Your most active apps: ${apps}. ${narrative.insight || ''}` : "I haven't spotted enough app activity yet.";
      } else if (ml.includes('ecosystem') || ml.includes('layer') || ml.includes('foundation')) {
        const sed = (lastData.sedimentation || {});
        const layers = sed.layers_raw || sed.layers || {};
        reply = `Your digital ecosystem has ${layers.bedrock || 0} foundation signals, ${layers.suspension || 0} active patterns, and ${layers.turbulent || 0} changing signals. ${narrative.insight || ''}`;
      } else if (ml.includes('help') || ml.includes('what can')) {
        reply = "You can ask me about your apps, your ecosystem layers, how I'm feeling, or just chat! I learn from your signals every time you use your device.";
      } else {
        reply = `${narrative.body || "I'm observing and learning."} ${narrative.next_step || ''}`;
      }
    }

    setTimeout(() => addMsg(agentName, reply, true), 200 + Math.random() * 400);
  });

  addMsg(agentName, "Hello! I'm your digital companion. I live inside your device's signal ecosystem. Ask me anything, or just watch me learn! 🌱", true);
})();
</script>
