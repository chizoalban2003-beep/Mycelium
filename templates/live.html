{% extends "base.html" %}
{% block content %}
<style>
  #world{position:relative;width:100%;height:70vh;min-height:420px;border-radius:12px;overflow:hidden;background:#020617;touch-action:none}
  #hud{position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none}
  #hud>*{pointer-events:auto}
  .hud-pill{backdrop-filter:blur(8px);background:rgba(2,6,23,0.7);border:1px solid rgba(34,211,238,0.2);border-radius:9999px;padding:4px 14px;font-size:11px;display:inline-flex;align-items:center;gap:6px}
  .signal-toast{animation:toastIn .4s ease;font-size:10px;padding:3px 10px;border-radius:6px;background:rgba(2,6,23,0.75);border:1px solid rgba(34,211,238,0.15);backdrop-filter:blur(4px)}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .chat-bubble{border-radius:16px;padding:8px 14px;max-width:85%;word-break:break-word;font-size:13px;line-height:1.4}
  .chat-user{background:#1e293b;margin-left:auto;border-bottom-right-radius:4px}
  .chat-agent{background:rgba(8,145,178,0.15);border:1px solid rgba(34,211,238,0.15);margin-right:auto;border-bottom-left-radius:4px}
  .glow-pulse{animation:glowPulse 3s ease-in-out infinite}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(34,211,238,0.3)}50%{box-shadow:0 0 24px rgba(34,211,238,0.6)}}
</style>

<!-- HUD overlay -->
<div id="hud" class="p-2 flex flex-wrap items-start gap-2">
  <div class="hud-pill glow-pulse">
    <span id="agentEmoji" class="text-lg">🌱</span>
    <span id="agentNameHud" class="text-cyan-200 font-semibold">Myco</span>
    <span id="stageHud" class="text-[9px] uppercase text-slate-400"></span>
    <span id="moodDot" class="w-2 h-2 rounded-full bg-cyan-400"></span>
    <span id="moodHud" class="text-[9px] text-slate-400"></span>
  </div>
  <div class="hud-pill">
    <span class="text-cyan-300 font-bold" id="sigCount">0</span>
    <span class="text-slate-400">signals</span>
  </div>
  <div class="hud-pill hidden" id="insightPill">
    <span class="text-emerald-300" id="insightText"></span>
  </div>
  <div class="ml-auto flex gap-1.5">
    <button id="btnCollect" class="hud-pill text-emerald-300 hover:text-emerald-200 cursor-pointer">⚡ Collect</button>
    <button id="btnLearn" class="hud-pill text-indigo-300 hover:text-indigo-200 cursor-pointer">🧠 Learn</button>
  </div>
</div>

<!-- 3D World -->
<div id="world">
  <canvas id="c"></canvas>
  <!-- Signal toast feed -->
  <div id="toasts" class="absolute top-12 right-2 w-48 space-y-1 pointer-events-none" style="max-height:200px;overflow:hidden"></div>
  <!-- Layer labels in world -->
  <div class="absolute left-3 text-[9px] uppercase tracking-widest font-medium pointer-events-none" style="top:8%;color:rgba(251,113,133,0.5)">Changing Signals</div>
  <div class="absolute left-3 text-[9px] uppercase tracking-widest font-medium pointer-events-none" style="top:42%;color:rgba(34,211,238,0.5)">Active Patterns</div>
  <div class="absolute left-3 text-[9px] uppercase tracking-widest font-medium pointer-events-none" style="top:76%;color:rgba(52,211,153,0.5)">Foundation</div>
</div>

<!-- Layer cards -->
<div class="grid grid-cols-3 gap-2 mt-2">
  <div class="rounded-xl border border-emerald-900/40 bg-emerald-950/10 p-2 text-center">
    <div class="text-[9px] uppercase tracking-widest text-emerald-400/60">Foundation</div>
    <div id="fCount" class="text-lg font-bold text-emerald-300">0</div>
    <div id="fList" class="text-[9px] text-slate-500 mt-0.5 line-clamp-1"></div>
  </div>
  <div class="rounded-xl border border-cyan-900/40 bg-cyan-950/10 p-2 text-center">
    <div class="text-[9px] uppercase tracking-widest text-cyan-400/60">Active</div>
    <div id="aCount" class="text-lg font-bold text-cyan-300">0</div>
    <div id="aList" class="text-[9px] text-slate-500 mt-0.5 line-clamp-1"></div>
  </div>
  <div class="rounded-xl border border-rose-900/40 bg-rose-950/10 p-2 text-center">
    <div class="text-[9px] uppercase tracking-widest text-rose-400/60">Changing</div>
    <div id="tCount" class="text-lg font-bold text-rose-300">0</div>
    <div id="tList" class="text-[9px] text-slate-500 mt-0.5 line-clamp-1"></div>
  </div>
</div>

<!-- JARVIS Chat -->
<div class="mt-2 rounded-xl border border-slate-800 bg-slate-900/80 backdrop-blur p-3">
  <div id="chatLog" class="h-40 overflow-y-auto space-y-2 pr-1"></div>
  <form id="chatForm" class="mt-2 flex gap-2">
    <input id="chatIn" type="text" placeholder="Talk to your companion…" autocomplete="off"
           class="flex-1 rounded-full bg-slate-950 border border-slate-800 px-4 py-2.5 text-sm text-slate-100 focus:border-cyan-700 focus:outline-none" />
    <button type="submit" class="rounded-full bg-cyan-700 hover:bg-cyan-600 active:scale-95 px-5 py-2.5 text-sm font-medium text-white transition-transform">Send</button>
  </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const $ = id => document.getElementById(id);
const W_EL = $('world'), CV = $('c');
let W, H;

// --- WebGL detection + 2D fallback ---
let use3D = true;
try {
  const testCanvas = document.createElement('canvas');
  const gl = testCanvas.getContext('webgl2') || testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
  if (!gl) use3D = false;
} catch(e) { use3D = false; }

function render2DFallback() {
  const ctx = CV.getContext('2d');
  if (!ctx) return;
  W = W_EL.clientWidth; H = W_EL.clientHeight;
  CV.width = W; CV.height = H;
  const layerColors = {turbulent:'#e11d48', suspension:'#0891b2', bedrock:'#059669'};
  let nodes2D = [], frame2D = 0;

  function draw2D() {
    frame2D++;
    ctx.fillStyle = '#020617'; ctx.fillRect(0,0,W,H);
    // Layer bands
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#e11d48'; ctx.fillRect(0,0,W,H/3);
    ctx.fillStyle = '#0891b2'; ctx.fillRect(0,H/3,W,H/3);
    ctx.fillStyle = '#059669'; ctx.fillRect(0,H*2/3,W,H/3);
    ctx.globalAlpha = 1;
    // Layer labels
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(251,113,133,0.5)'; ctx.fillText('CHANGING SIGNALS', 8, 16);
    ctx.fillStyle = 'rgba(34,211,238,0.5)'; ctx.fillText('ACTIVE PATTERNS', 8, H/3+16);
    ctx.fillStyle = 'rgba(52,211,153,0.5)'; ctx.fillText('FOUNDATION', 8, H*2/3+16);
    // Nodes
    nodes2D.forEach(n => {
      n.x += (Math.random()-0.5)*0.3; n.y += Math.sin(frame2D*0.02+n.phase)*0.2;
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = layerColors[n.layer]||'#64748b'; ctx.globalAlpha=0.7; ctx.fill(); ctx.globalAlpha=1;
      if(n.r>4){ctx.font='9px sans-serif';ctx.fillStyle='#cbd5e1';ctx.textAlign='center';ctx.fillText(n.label,n.x,n.y-n.r-3);}
    });
    // Agent
    const agentY = H*0.75, agentX = W/2 + Math.sin(frame2D*0.01)*20;
    ctx.beginPath(); ctx.arc(agentX,agentY,12,0,Math.PI*2);
    ctx.fillStyle='rgba(34,211,238,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(agentX,agentY,8,0,Math.PI*2);
    ctx.fillStyle='#0f172a'; ctx.fill(); ctx.strokeStyle='rgba(34,211,238,0.6)'; ctx.lineWidth=2; ctx.stroke();
    ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.fillText('🌱',agentX,agentY+5);
    requestAnimationFrame(draw2D);
  }
  draw2D();

  // Update from data
  window._update2DNodes = function(features) {
    nodes2D = (features||[]).map((f,i) => ({
      x: W*0.15 + (i/(features.length||1))*W*0.7,
      y: f.layer==='turbulent'?H*0.17:f.layer==='suspension'?H*0.5:H*0.8,
      r: Math.max(3,Math.min(12,Math.sqrt(f.density||1)*2)),
      layer: f.layer, label: (f.feature||'').slice(0,14), phase: Math.random()*6,
    }));
  };
}

if (!use3D) {
  render2DFallback();
  // Skip 3D setup — jump to data polling section below
}

// --- 3D Setup (only if WebGL available) ---
if (!use3D) {
  // Minimal stubs so the rest of the script doesn't error
  var camera = {aspect:1, position:{set:()=>{},x:0,y:0,z:0}, updateProjectionMatrix:()=>{}, lookAt:()=>{}};
  var renderer = {setSize:()=>{}, setPixelRatio:()=>{}, render:()=>{}};
  var scene = {add:()=>{}, remove:()=>{}};
  var agentGroup = {position:{x:0,y:0,z:0,set:()=>{}}, scale:{set:()=>{}}, rotation:{y:0}};
  var bodyMat={emissive:{setHex:()=>{}}}, headMat={emissive:{setHex:()=>{}}}, eyeMat={color:{setHex:()=>{}}}, auraMat={color:{setHex:()=>{}},opacity:0};
  var buildings = [];
  function clearBuildings(){}
  function createBuilding(){}
  function spawnP(){}
  var agentTarget = {set:()=>{}};
  W = W_EL.clientWidth; H = W_EL.clientHeight;
} else {

function resize(){ W=W_EL.clientWidth; H=W_EL.clientHeight; camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H); }

// --- Three.js Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020617);
scene.fog = new THREE.FogExp2(0x020617, 0.0015);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 600);
camera.position.set(0, 60, 100);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({canvas:CV, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
W=W_EL.clientWidth; H=W_EL.clientHeight; renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix();
window.addEventListener('resize', resize);

// Lights
scene.add(new THREE.AmbientLight(0x334155, 0.5));
const sun = new THREE.DirectionalLight(0xfff4e6, 0.35); sun.position.set(40,80,60); scene.add(sun);
const rim = new THREE.PointLight(0x22d3ee, 0.4, 200); rim.position.set(-30,50,-40); scene.add(rim);
const ground_light = new THREE.PointLight(0x059669, 0.25, 120); ground_light.position.set(0,-20,0); scene.add(ground_light);

// --- Terrain (Clash of Clans island) ---
const terrainGeo = new THREE.CylinderGeometry(70, 75, 6, 64);
const terrainMat = new THREE.MeshPhongMaterial({color:0x0f172a, flatShading:true, transparent:true, opacity:0.7});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.position.y = -28;
scene.add(terrain);

// Water ring
const waterGeo = new THREE.RingGeometry(72, 120, 64);
const waterMat = new THREE.MeshBasicMaterial({color:0x082f49, transparent:true, opacity:0.4, side:THREE.DoubleSide});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2; water.position.y = -25;
scene.add(water);

// Grid on terrain surface
const grid = new THREE.GridHelper(140, 40, 0x1e293b, 0x0f172a);
grid.position.y = -24.5;
scene.add(grid);

// Layer indicator rings
function addRing(y, color, r){ const g=new THREE.RingGeometry(r-0.5,r,64); const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.12,side:THREE.DoubleSide}); const mesh=new THREE.Mesh(g,m); mesh.rotation.x=-Math.PI/2; mesh.position.y=y; scene.add(mesh); return mesh; }
addRing(-20, 0x059669, 55);
addRing(0, 0x0891b2, 50);
addRing(20, 0xe11d48, 45);

// --- Agent Avatar (3D character) ---
const agentGroup = new THREE.Group();
// Body
const bodyGeo = new THREE.CapsuleGeometry(1.5, 3, 12, 24);
const bodyMat = new THREE.MeshPhongMaterial({color:0x0f172a, emissive:0x22d3ee, emissiveIntensity:0.25, transparent:true, opacity:0.92});
agentGroup.add(new THREE.Mesh(bodyGeo, bodyMat));
// Head
const headGeo = new THREE.SphereGeometry(1.2, 16, 16);
const headMat = new THREE.MeshPhongMaterial({color:0x0f172a, emissive:0x22d3ee, emissiveIntensity:0.3});
const head = new THREE.Mesh(headGeo, headMat); head.position.y = 3.2; agentGroup.add(head);
// Eyes
const eyeGeo = new THREE.SphereGeometry(0.22, 8, 8);
const eyeMat = new THREE.MeshBasicMaterial({color:0x22d3ee});
const lEye = new THREE.Mesh(eyeGeo, eyeMat); lEye.position.set(-0.4, 3.4, 1.05); agentGroup.add(lEye);
const rEye = new THREE.Mesh(eyeGeo, eyeMat); rEye.position.set(0.4, 3.4, 1.05); agentGroup.add(rEye);
// Glow aura
const auraGeo = new THREE.SphereGeometry(3.5, 16, 16);
const auraMat = new THREE.MeshBasicMaterial({color:0x22d3ee, transparent:true, opacity:0.06});
const aura = new THREE.Mesh(auraGeo, auraMat);
agentGroup.add(aura);

agentGroup.position.set(0, -18, 0);
scene.add(agentGroup);

let agentTarget = new THREE.Vector3(0, -18, 0);
const moodHex = {curious:0x22d3ee, content:0x34d399, agitated:0xfb7185, focused:0x818cf8};
const stageScale = {infant:1, toddler:1.4, adolescent:1.8};
const stageEmoji = {infant:'🌱', toddler:'🌿', adolescent:'🌳'};

// --- Feature buildings (Clash-of-Clans style structures) ---
let buildings = [];
function clearBuildings(){ buildings.forEach(b=>{scene.remove(b.group)}); buildings=[]; }

function createBuilding(f, idx, total){
  const g = new THREE.Group();
  const layer = f.layer || 'suspension';
  const baseY = {bedrock:-20, suspension:0, turbulent:20}[layer] || 0;
  const angle = (idx/total)*Math.PI*2 + Math.random()*0.3;
  const radius = 20 + Math.random()*30;

  // Building size based on density
  const h = Math.max(1, Math.min(10, Math.sqrt(f.density||1)*1.2));
  const w = Math.max(0.8, Math.min(3, h*0.4));
  const colors = {bedrock:0x059669, suspension:0x0891b2, turbulent:0xe11d48};
  const c = colors[layer] || 0x64748b;

  // Base platform
  const platGeo = new THREE.CylinderGeometry(w+0.5, w+0.8, 0.5, 8);
  const platMat = new THREE.MeshPhongMaterial({color:c, transparent:true, opacity:0.4});
  g.add(new THREE.Mesh(platGeo, platMat));

  // Main structure (tower)
  const towGeo = new THREE.CylinderGeometry(w*0.6, w, h, 8);
  const towMat = new THREE.MeshPhongMaterial({color:c, emissive:c, emissiveIntensity:0.1, transparent:true, opacity:0.75});
  const tow = new THREE.Mesh(towGeo, towMat); tow.position.y = h/2+0.25; g.add(tow);

  // Top orb (signal strength indicator)
  const orbGeo = new THREE.SphereGeometry(w*0.35, 8, 8);
  const orbMat = new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:0.6});
  const orb = new THREE.Mesh(orbGeo, orbMat); orb.position.y = h+0.8; g.add(orb);

  // Label sprite
  const lc = document.createElement('canvas'); lc.width=256; lc.height=40;
  const lx = lc.getContext('2d'); lx.font='bold 16px sans-serif'; lx.fillStyle='#e2e8f0'; lx.textAlign='center';
  const label = (f.feature||'').length>16 ? f.feature.slice(0,15)+'…' : f.feature;
  lx.fillText(label, 128, 25);
  const tex = new THREE.CanvasTexture(lc);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, opacity:0.8}));
  sprite.position.y = h+2.5; sprite.scale.set(6,1.5,1); g.add(sprite);

  g.position.set(Math.cos(angle)*radius, baseY, Math.sin(angle)*radius);
  scene.add(g);

  // Force vector arrows (gravity=green, em=cyan, strong=orange, weak=red)
  const arrows=[];
  if(f.forces){
    const forceColors={gravity:0x059669, electromagnetic:0x22d3ee, strong_nuclear:0xf59e0b, weak_nuclear:0xef4444};
    Object.entries(forceColors).forEach(([fname,fc])=>{
      const fv=f.forces[fname];
      if(!fv||!Array.isArray(fv))return;
      const mag=Math.sqrt(fv[0]*fv[0]+fv[1]*fv[1]+fv[2]*fv[2]);
      if(mag<0.05)return;
      const dir=new THREE.Vector3(fv[0],fv[1],fv[2]).normalize();
      const len=Math.min(8,mag*3);
      const arrowGeo=new THREE.CylinderGeometry(0.08,0.08,len,4);
      const arrowMat=new THREE.MeshBasicMaterial({color:fc,transparent:true,opacity:0.4});
      const arrow=new THREE.Mesh(arrowGeo,arrowMat);
      arrow.position.set(0,h/2+1,0);
      arrow.lookAt(dir.multiplyScalar(5));
      g.add(arrow);
      arrows.push(arrow);
    });
  }

  buildings.push({group:g, data:f, orb, orbMat, baseY, angle, radius, arrows});
}

// --- Signal particles ---
const MAX_P = 400;
const pPos = new Float32Array(MAX_P*3);
const pCol = new Float32Array(MAX_P*3);
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
const pMat = new THREE.PointsMaterial({size:0.6, vertexColors:true, transparent:true, opacity:0.5});
scene.add(new THREE.Points(pGeo, pMat));
let pCount = 0;
function spawnP(layer){
  if(pCount>=MAX_P) pCount=0;
  const i=pCount*3, y={turbulent:20,suspension:0,bedrock:-20}[layer]||0;
  pPos[i]=(Math.random()-0.5)*100; pPos[i+1]=y+(Math.random()-0.5)*15; pPos[i+2]=(Math.random()-0.5)*100;
  const cv=new THREE.Color({bedrock:0x059669,suspension:0x0891b2,turbulent:0xe11d48}[layer]||0x64748b);
  pCol[i]=cv.r; pCol[i+1]=cv.g; pCol[i+2]=cv.b;
  pCount++; pGeo.attributes.position.needsUpdate=true; pGeo.attributes.color.needsUpdate=true;
}

// --- Camera orbit ---
let drag=false, pX=0, pY=0, theta=0, phi=0.35, dist=100;
W_EL.addEventListener('pointerdown',e=>{drag=true;pX=e.clientX;pY=e.clientY});
W_EL.addEventListener('pointermove',e=>{if(!drag)return; theta-=(e.clientX-pX)*0.004; phi=Math.max(-0.6,Math.min(1.0,phi-(e.clientY-pY)*0.004)); pX=e.clientX;pY=e.clientY});
W_EL.addEventListener('pointerup',()=>{drag=false});
W_EL.addEventListener('wheel',e=>{dist=Math.max(40,Math.min(180,dist+e.deltaY*0.08))},{passive:true});

// --- Animate ---
let frame=0;
function animate(){
  requestAnimationFrame(animate);
  frame++;

  // Camera
  if(!drag) theta+=0.0008;
  camera.position.x=Math.sin(theta)*Math.cos(phi)*dist;
  camera.position.y=Math.sin(phi)*dist*0.6+30;
  camera.position.z=Math.cos(theta)*Math.cos(phi)*dist;
  camera.lookAt(0,0,0);

  // Agent bob + wander
  agentGroup.position.x+=(agentTarget.x-agentGroup.position.x)*0.008;
  agentGroup.position.y+=(agentTarget.y-agentGroup.position.y)*0.008;
  agentGroup.position.z+=(agentTarget.z-agentGroup.position.z)*0.008;
  agentGroup.position.y+=Math.sin(frame*0.025)*0.15;
  agentGroup.rotation.y+=0.003;
  auraMat.opacity=0.04+Math.sin(frame*0.03)*0.03;

  // Building orbs pulse
  buildings.forEach((b,i)=>{
    b.orb.position.y+= Math.sin(frame*0.02+i)*0.01;
    b.orbMat.opacity=0.4+Math.sin(frame*0.04+i*0.5)*0.2;
  });

  // Particles drift
  for(let i=0;i<pCount*3;i+=3){pPos[i]+=(Math.random()-0.5)*0.08;pPos[i+1]+=(Math.random()-0.5)*0.04;pPos[i+2]+=(Math.random()-0.5)*0.08;}
  pGeo.attributes.position.needsUpdate=true;

  // Ambient spawns
  if(frame%12===0) spawnP(['turbulent','suspension','bedrock'][Math.floor(Math.random()*3)]);

  // Water shimmer
  water.material.opacity=0.3+Math.sin(frame*0.01)*0.1;

  renderer.render(scene, camera);
}
animate();

// Agent wanders to buildings periodically
setInterval(()=>{
  if(!buildings.length)return;
  const bed=buildings.filter(b=>b.data.layer==='bedrock');
  const pick = bed.length ? bed[Math.floor(Math.random()*bed.length)] : buildings[Math.floor(Math.random()*buildings.length)];
  agentTarget.set(pick.group.position.x, pick.baseY+3, pick.group.position.z);
},5000);

} // end of use3D else block

// --- Data polling ---
let lastData=null, agentName='Myco', stage='infant', mood='curious';
let chatHistory = [];

async function poll(){
  try{
    const r=await fetch('/api/ecosystem/live',{credentials:'same-origin'});
    if(!r.ok)return; const d=await r.json(); if(!d.ok)return;
    lastData=d; applyData(d);
  }catch(e){}
}

function applyData(d){
  const a=d.agent||{};
  agentName=a.given_name||'Myco'; stage=d.stage||'infant'; mood=a.mood||'curious';
  $('agentNameHud').textContent=agentName;
  $('stageHud').textContent=stage;
  $('moodHud').textContent=mood;
  $('agentEmoji').textContent=stageEmoji[stage]||'🌱';
  $('sigCount').textContent=(d.summary||{}).n_signals||0;

  const mc=moodHex[mood]||0x22d3ee;
  bodyMat.emissive.setHex(mc); headMat.emissive.setHex(mc); eyeMat.color.setHex(mc); auraMat.color.setHex(mc);
  const s=stageScale[stage]||1; agentGroup.scale.set(s,s,s);

  const mdColors={curious:'bg-cyan-400',content:'bg-emerald-400',agitated:'bg-rose-400',focused:'bg-indigo-400'};
  $('moodDot').className='w-2 h-2 rounded-full '+(mdColors[mood]||'bg-cyan-400');

  // Insight pill
  const n=d.narrative||{};
  if(n.insight && n.insight.length>10){$('insightPill').classList.remove('hidden'); $('insightText').textContent=n.insight;}

  // 2D fallback update
  if(!use3D && window._update2DNodes && d.sedimentation && d.sedimentation.features){
    window._update2DNodes(d.sedimentation.features);
  }

  // Buildings from sedimentation features, enriched with force field data
  const sed=d.sedimentation;
  const ffParticles=(d.force_field&&d.force_field.particles)||[];
  if(sed&&sed.features&&sed.features.length){
    clearBuildings();
    sed.features.forEach((f,i)=>{
      // Merge force field data into feature
      const ffp=ffParticles.find(p=>p.name===f.raw_feature||p.name===f.feature);
      if(ffp){
        f.forces=ffp.forces; f.momentum=ffp.momentum;
        f.medium=ffp.medium; f.energy=ffp.energy;
        f.stationarity=ffp.stationarity;
      }
      createBuilding(f, i, sed.features.length);
    });
  }

  // Signal toasts
  const toasts=$('toasts'); toasts.innerHTML='';
  (d.live_signals||[]).slice(0,5).forEach(s=>{
    const el=document.createElement('div'); el.className='signal-toast text-cyan-300/70';
    el.textContent='⚡ '+s.type; toasts.appendChild(el);
    spawnP(['turbulent','suspension','bedrock'][Math.floor(Math.random()*3)]);
  });

  // Force field integration
  const ff=d.force_field;
  if(ff&&ff.agent){
    const ag=ff.agent;
    if(ag.crystallized){
      agentTarget.set((ag.center||[])[0]||0, ((ag.center||[])[1]||0)*3-18, (ag.center||[])[2]||0);
      const eScale=(stageScale[ag.stage]||1)*(0.8+ag.coherence*0.5);
      agentGroup.scale.set(eScale,eScale,eScale);
      if(ag.stage){stage=ag.stage; $('stageHud').textContent=ag.stage; $('agentEmoji').textContent=stageEmoji[ag.stage]||'🌱';}
    }
    const m=ff.metrics||{};
    if(m.n_particles) $('sigCount').textContent=m.n_particles+' | E:'+m.total_energy.toFixed(1);
    const cons=ff.conservation||{};
    if(cons.entropy>0){$('insightPill').classList.remove('hidden'); $('insightText').textContent='Attention entropy: '+cons.entropy.toFixed(2)+' · Forces: G:'+((m.forces||{}).gravity||0).toFixed(1)+' E:'+((m.forces||{}).electromagnetic||0).toFixed(1);}
  }

  // Layer cards
  const feats=(sed&&sed.features)||[];
  const byL={bedrock:[],suspension:[],turbulent:[]};
  feats.forEach(f=>{if(byL[f.layer])byL[f.layer].push(f.feature)});
  $('fCount').textContent=byL.bedrock.length; $('fList').textContent=byL.bedrock.slice(0,4).join(', ')||'—';
  $('aCount').textContent=byL.suspension.length; $('aList').textContent=byL.suspension.slice(0,4).join(', ')||'—';
  $('tCount').textContent=byL.turbulent.length; $('tList').textContent=byL.turbulent.slice(0,4).join(', ')||'—';
}

poll(); setInterval(poll, 5000);

// Auto-collect
setInterval(async()=>{
  try{await fetch('/api/ecosystem/collect',{method:'POST',credentials:'same-origin'})}catch(e){}
}, 12000);

$('btnCollect').onclick=async()=>{
  try{const r=await fetch('/api/ecosystem/collect',{method:'POST',credentials:'same-origin'}); const d=await r.json(); setTimeout(poll,300);}catch(e){}
};
$('btnLearn').onclick=async()=>{
  try{const r=await fetch('/api/ecosystem/learn',{method:'POST',credentials:'same-origin'}); setTimeout(poll,300);}catch(e){}
};

// --- JARVIS Chat ---
const chatLog=$('chatLog'), chatForm=$('chatForm'), chatIn=$('chatIn');

function addMsg(from, text, isAgent){
  const el=document.createElement('div');
  el.className='chat-bubble '+(isAgent?'chat-agent text-cyan-100':'chat-user text-slate-200');
  el.textContent=text;
  chatLog.appendChild(el);
  chatLog.scrollTop=chatLog.scrollHeight;
}

chatForm.onsubmit=async(e)=>{
  e.preventDefault();
  const msg=chatIn.value.trim(); if(!msg)return;
  chatIn.value='';
  addMsg('You', msg, false);
  chatHistory.push({role:'user',content:msg});

  try{
    const r=await fetch('/api/ecosystem/chat',{
      method:'POST', credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg, history:chatHistory.slice(-8)}),
    });
    const d=await r.json();
    const reply=d.reply||"I'm thinking...";
    addMsg(agentName, reply, true);
    chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    addMsg(agentName, "Connection lost. I'll be right back.", true);
  }
};

addMsg(agentName, "Hello! I'm your digital companion. I live in your device's ecosystem and learn from your signals. Ask me anything — about your apps, routines, focus, or just say hi! 🌱", true);

})();
