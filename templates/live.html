{% extends "base.html" %}

{% block content %}
<div class="space-y-3">

  <!-- Agent narrative bar -->
  <div id="agentBar" class="rounded-xl border border-cyan-900/60 bg-gradient-to-r from-slate-900 via-slate-900 to-cyan-950/30 px-5 py-3 flex items-center gap-4">
    <div id="agentAvatar" class="w-12 h-12 rounded-full border-2 border-cyan-400/50 flex items-center justify-center text-2xl bg-slate-800 shrink-0 transition-all duration-500"></div>
    <div class="min-w-0 flex-1">
      <div class="flex items-center gap-2">
        <span id="agentName" class="font-bold text-slate-100">Myco</span>
        <span id="agentStageBadge" class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-slate-800 border border-slate-700 text-slate-400"></span>
        <span id="agentMood" class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-cyan-950 border border-cyan-900 text-cyan-300"></span>
      </div>
      <div id="agentSpeech" class="text-sm text-slate-300 mt-0.5 truncate"></div>
    </div>
    <div class="text-right shrink-0">
      <div id="signalCounter" class="text-lg font-bold text-cyan-300">0</div>
      <div class="text-[10px] text-slate-500 uppercase">signals</div>
    </div>
  </div>

  <!-- Live ecosystem canvas -->
  <div class="rounded border border-slate-800 bg-slate-950 relative" style="height: 520px;">
    <canvas id="liveCanvas" class="w-full h-full rounded"></canvas>
    <!-- Signal feed overlay -->
    <div id="signalFeed" class="absolute top-2 right-2 w-56 max-h-48 overflow-hidden pointer-events-none">
    </div>
    <!-- Layer labels -->
    <div class="absolute left-2 top-2 text-[9px] uppercase tracking-widest text-rose-400/50 pointer-events-none">Turbulent Surface</div>
    <div class="absolute left-2 pointer-events-none text-[9px] uppercase tracking-widest text-cyan-400/50" style="top: 35%;">Suspension Layer</div>
    <div class="absolute left-2 pointer-events-none text-[9px] uppercase tracking-widest text-emerald-400/50" style="top: 68%;">Bedrock Floor</div>
  </div>

  <!-- Controls -->
  <div class="flex items-center gap-3">
    <button id="btnCollectLive" class="rounded bg-emerald-700 px-3 py-1.5 text-xs font-medium text-white hover:bg-emerald-600">Collect Signals</button>
    <button id="btnLearnLive" class="rounded bg-indigo-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-indigo-500">Run Learning Cycle</button>
    <label class="flex items-center gap-1.5 text-xs text-slate-400 select-none">
      <input type="checkbox" id="autoCollect" checked class="accent-cyan-400" /> Auto-collect every 10s
    </label>
    <span id="liveStatus" class="text-xs text-slate-500 ml-auto"></span>
  </div>

  <!-- Bottom panels -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
    <div class="rounded border border-emerald-900/50 bg-emerald-950/10 p-3">
      <div class="text-[10px] uppercase tracking-widest text-emerald-300/70">Bedrock</div>
      <div id="bedrockList" class="mt-1 text-xs text-slate-300 leading-relaxed"></div>
    </div>
    <div class="rounded border border-cyan-900/50 bg-cyan-950/10 p-3">
      <div class="text-[10px] uppercase tracking-widest text-cyan-300/70">Suspension</div>
      <div id="suspensionList" class="mt-1 text-xs text-slate-300 leading-relaxed"></div>
    </div>
    <div class="rounded border border-rose-900/50 bg-rose-950/10 p-3">
      <div class="text-[10px] uppercase tracking-widest text-rose-300/70">Turbulent</div>
      <div id="turbulentList" class="mt-1 text-xs text-slate-300 leading-relaxed"></div>
    </div>
  </div>

  <!-- Chat with agent -->
  <div class="rounded border border-slate-800 bg-slate-900 p-4">
    <div class="text-xs uppercase tracking-[0.2em] text-cyan-300/80 mb-2">Talk to your companion</div>
    <div id="chatMessages" class="h-32 overflow-y-auto rounded bg-slate-950 border border-slate-800 p-2 space-y-1 text-sm"></div>
    <form id="chatForm" class="mt-2 flex gap-2">
      <input id="chatInput" type="text" placeholder="Type a message…" autocomplete="off"
             class="flex-1 rounded bg-slate-950 border border-slate-800 px-3 py-1.5 text-sm text-slate-100" />
      <button type="submit" class="rounded bg-cyan-700 hover:bg-cyan-600 px-3 py-1.5 text-xs font-medium text-white">Send</button>
    </form>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('liveCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let nodes = [], links = [];
  let agentX, agentY, agentTargetX, agentTargetY;
  let agentStage = 'infant', agentMood = 'curious', agentName = 'Myco', agentGender = 'neutral';
  let particles = [];
  let signalRipples = [];
  let frame = 0;
  let lastData = null;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = canvas.width = rect.width;
    H = canvas.height = rect.height;
    agentX = agentTargetX = W / 2;
    agentY = agentTargetY = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // --- Avatar drawing ---
  const stageEmoji = { infant: '🌱', toddler: '🌿', adolescent: '🌳' };
  const stageSize = { infant: 18, toddler: 24, adolescent: 30 };
  const moodGlow = {
    curious: 'rgba(34,211,238,0.3)', content: 'rgba(52,211,153,0.3)',
    agitated: 'rgba(251,113,133,0.3)', focused: 'rgba(129,140,248,0.3)',
  };

  function drawAgent() {
    // Smooth movement toward target
    agentX += (agentTargetX - agentX) * 0.03;
    agentY += (agentTargetY - agentY) * 0.03;

    const sz = stageSize[agentStage] || 18;
    const glow = moodGlow[agentMood] || moodGlow.curious;

    // Glow pulse
    const pulse = 1 + Math.sin(frame * 0.04) * 0.15;
    ctx.save();
    ctx.beginPath();
    ctx.arc(agentX, agentY, sz * pulse * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Body circle
    ctx.beginPath();
    ctx.arc(agentX, agentY, sz, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(agentX, agentY, 0, agentX, agentY, sz);
    grad.addColorStop(0, 'rgba(15,23,42,0.9)');
    grad.addColorStop(1, 'rgba(15,23,42,0.5)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = glow.replace('0.3', '0.7');
    ctx.lineWidth = 2;
    ctx.stroke();

    // Emoji
    ctx.font = `${sz}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stageEmoji[agentStage] || '🌱', agentX, agentY);

    // Name label
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#e2e8f0';
    ctx.textAlign = 'center';
    ctx.fillText(agentName, agentX, agentY - sz - 8);

    // Stage/mood small label
    ctx.font = '8px sans-serif';
    ctx.fillStyle = 'rgba(148,163,184,0.7)';
    ctx.fillText(agentStage + ' · ' + agentMood, agentX, agentY + sz + 12);

    ctx.restore();
  }

  // --- Particle system (ambient signals) ---
  function spawnParticle(type, layer) {
    const yBase = layer === 'turbulent' ? H * 0.15 : layer === 'suspension' ? H * 0.5 : H * 0.8;
    particles.push({
      x: Math.random() * W, y: yBase + (Math.random() - 0.5) * H * 0.15,
      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.3,
      life: 1.0, decay: 0.003 + Math.random() * 0.004,
      r: 2 + Math.random() * 3, type: type, layer: layer,
    });
  }

  function drawParticles() {
    const layerColor = { turbulent: [251,113,133], suspension: [34,211,238], bedrock: [52,211,153] };
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.life -= p.decay;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      const c = layerColor[p.layer] || [148,163,184];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${p.life * 0.6})`;
      ctx.fill();
    });
  }

  // --- Signal ripples ---
  function addRipple(x, y) {
    signalRipples.push({ x, y, r: 5, maxR: 40 + Math.random() * 30, alpha: 0.6 });
  }

  function drawRipples() {
    signalRipples = signalRipples.filter(r => r.alpha > 0.01);
    signalRipples.forEach(r => {
      r.r += 1.5; r.alpha *= 0.96;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(34,211,238,${r.alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  // --- Feature nodes (from sedimentation graph) ---
  const layerColors = { bedrock: '#059669', suspension: '#0891b2', turbulent: '#e11d48' };

  function updateGraph(graphData) {
    if (!graphData) return;
    const gNodes = graphData.nodes || [];
    const gLinks = graphData.links || [];

    // Map nodes to canvas positions based on depth
    nodes = gNodes.map(n => {
      const existing = nodes.find(e => e.id === n.id);
      return {
        ...n,
        x: existing ? existing.x : W * 0.15 + Math.random() * W * 0.7,
        y: existing ? existing.y : 30 + (n.depth || 0.5) * (H - 60),
        targetY: 30 + (n.depth || 0.5) * (H - 60),
        vx: 0, vy: 0,
        radius: Math.max(3, Math.min(14, Math.sqrt(n.mass || 1) * 2.5)),
      };
    });
    links = gLinks;
  }

  function tickNodes() {
    const nodeMap = {};
    nodes.forEach(n => { nodeMap[n.id] = n; });

    // Attraction to target Y (depth-based gravity)
    nodes.forEach(n => {
      n.vy += (n.targetY - n.y) * 0.02;
      n.vx += (W / 2 - n.x) * 0.002;
    });

    // Link attraction
    links.forEach(l => {
      const a = nodeMap[l.source], b = nodeMap[l.target];
      if (!a || !b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const f = (dist - 60) * 0.003 * (l.weight || 0.5);
      a.vx += (dx / dist) * f; a.vy += (dy / dist) * f;
      b.vx -= (dx / dist) * f; b.vy -= (dy / dist) * f;
    });

    // Repulsion (only nearby pairs for perf)
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist2 = dx * dx + dy * dy;
        if (dist2 > 40000) continue;
        const dist = Math.sqrt(dist2) || 1;
        const f = 200 / (dist * dist);
        a.vx -= (dx / dist) * f; a.vy -= (dy / dist) * f;
        b.vx += (dx / dist) * f; b.vy += (dy / dist) * f;
      }
    }

    nodes.forEach(n => {
      n.vx *= 0.85; n.vy *= 0.85;
      n.x = Math.max(n.radius, Math.min(W - n.radius, n.x + n.vx));
      n.y = Math.max(n.radius, Math.min(H - n.radius, n.y + n.vy));
    });
  }

  function drawGraph() {
    const nodeMap = {};
    nodes.forEach(n => { nodeMap[n.id] = n; });

    // Links
    links.forEach(l => {
      const a = nodeMap[l.source], b = nodeMap[l.target];
      if (!a || !b) return;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = 'rgba(34,211,238,0.15)';
      ctx.lineWidth = Math.max(0.5, (l.weight || 0.3) * 1.5);
      ctx.stroke();
    });

    // Nodes
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
      ctx.fillStyle = layerColors[n.layer] || '#64748b';
      ctx.globalAlpha = 0.8;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      if (n.radius > 5) {
        ctx.font = '8px sans-serif';
        ctx.fillStyle = '#cbd5e1';
        ctx.textAlign = 'center';
        const label = n.label.length > 10 ? n.label.slice(0, 9) + '…' : n.label;
        ctx.fillText(label, n.x, n.y - n.radius - 3);
      }
    });
  }

  // --- Background layers ---
  function drawBackground() {
    ctx.clearRect(0, 0, W, H);

    // Gradient bands
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(159,18,57,0.06)');
    grad.addColorStop(0.33, 'rgba(159,18,57,0.03)');
    grad.addColorStop(0.33, 'rgba(8,145,178,0.04)');
    grad.addColorStop(0.66, 'rgba(8,145,178,0.02)');
    grad.addColorStop(0.66, 'rgba(5,150,105,0.05)');
    grad.addColorStop(1, 'rgba(5,150,105,0.03)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Divider lines
    ctx.setLineDash([4, 8]);
    ctx.strokeStyle = 'rgba(148,163,184,0.1)';
    ctx.lineWidth = 1;
    [H * 0.33, H * 0.66].forEach(y => {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // --- Main render loop ---
  function render() {
    frame++;
    drawBackground();
    tickNodes();
    drawGraph();
    drawParticles();
    drawRipples();
    drawAgent();

    // Ambient particle spawning
    if (frame % 15 === 0) {
      const layers = ['turbulent', 'suspension', 'bedrock'];
      spawnParticle('ambient', layers[Math.floor(Math.random() * 3)]);
    }

    requestAnimationFrame(render);
  }
  render();

  // --- Agent movement: wander toward dense areas ---
  function moveAgentToward(target) {
    if (target) {
      agentTargetX = target.x || W / 2;
      agentTargetY = target.y || H / 2;
    }
  }

  setInterval(() => {
    if (nodes.length === 0) return;
    // Move toward a random bedrock or high-mass node
    const candidates = nodes.filter(n => n.layer === 'bedrock' || (n.mass || 0) > 2);
    if (candidates.length) {
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      moveAgentToward({ x: pick.x + (Math.random() - 0.5) * 40, y: pick.y + (Math.random() - 0.5) * 30 });
    }
  }, 4000);

  // --- Data polling ---
  async function fetchLive() {
    try {
      const r = await fetch('/api/ecosystem/live', { credentials: 'same-origin' });
      if (!r.ok) return;
      const data = await r.json();
      if (!data.ok) return;
      lastData = data;
      applyData(data);
    } catch (e) {}
  }

  function applyData(data) {
    // Agent state
    const a = data.agent || {};
    agentName = a.given_name || 'Myco';
    agentStage = data.stage || 'infant';
    agentMood = a.mood || 'curious';
    agentGender = a.gender || 'neutral';

    document.getElementById('agentName').textContent = agentName;
    document.getElementById('agentStageBadge').textContent = agentStage;
    document.getElementById('agentMood').textContent = agentMood;
    document.getElementById('signalCounter').textContent = (data.summary || {}).n_signals || 0;

    // Avatar emoji
    const avatarEl = document.getElementById('agentAvatar');
    avatarEl.textContent = stageEmoji[agentStage] || '🌱';
    const moodBorders = { curious: 'border-cyan-400/50', content: 'border-emerald-400/50', agitated: 'border-rose-400/50', focused: 'border-indigo-400/50' };
    avatarEl.className = 'w-12 h-12 rounded-full border-2 flex items-center justify-center text-2xl bg-slate-800 shrink-0 transition-all duration-500 ' + (moodBorders[agentMood] || moodBorders.curious);

    // Narrative
    const n = data.narrative || {};
    document.getElementById('agentSpeech').textContent = n.headline || '';

    // Graph
    if (data.graph) updateGraph(data.graph);

    // Live signal feed
    const feed = document.getElementById('signalFeed');
    feed.innerHTML = '';
    (data.live_signals || []).slice(0, 8).forEach(s => {
      const el = document.createElement('div');
      el.className = 'text-[10px] text-cyan-300/70 mb-0.5 animate-pulse';
      el.textContent = '→ ' + s.type;
      feed.appendChild(el);
      // Spawn ripple for recent signals
      addRipple(W * 0.7 + Math.random() * W * 0.2, Math.random() * H);
    });

    // Layer panels
    const sed = data.sedimentation || {};
    const feats = sed.features || [];
    const byLayer = { bedrock: [], suspension: [], turbulent: [] };
    feats.forEach(f => { if (byLayer[f.layer]) byLayer[f.layer].push(f.feature); });
    document.getElementById('bedrockList').textContent = byLayer.bedrock.slice(0, 8).join(', ') || '—';
    document.getElementById('suspensionList').textContent = byLayer.suspension.slice(0, 8).join(', ') || '—';
    document.getElementById('turbulentList').textContent = byLayer.turbulent.slice(0, 8).join(', ') || '—';
  }

  // Initial + periodic polling
  fetchLive();
  setInterval(fetchLive, 5000);

  // Auto-collect
  let autoTimer = setInterval(async () => {
    if (!document.getElementById('autoCollect').checked) return;
    try {
      await fetch('/api/ecosystem/collect', { method: 'POST', credentials: 'same-origin' });
      document.getElementById('liveStatus').textContent = 'signal collected ' + new Date().toLocaleTimeString();
    } catch (e) {}
  }, 10000);

  document.getElementById('btnCollectLive').addEventListener('click', async () => {
    document.getElementById('liveStatus').textContent = 'collecting…';
    try {
      const r = await fetch('/api/ecosystem/collect', { method: 'POST', credentials: 'same-origin' });
      const d = await r.json();
      document.getElementById('liveStatus').textContent = 'collected ' + d.signals_collected + ' signals';
      setTimeout(fetchLive, 300);
    } catch (e) { document.getElementById('liveStatus').textContent = 'error'; }
  });

  document.getElementById('btnLearnLive').addEventListener('click', async () => {
    document.getElementById('liveStatus').textContent = 'learning…';
    try {
      const r = await fetch('/api/ecosystem/learn', { method: 'POST', credentials: 'same-origin' });
      const d = await r.json();
      document.getElementById('liveStatus').textContent = d.ok ? 'learning complete (' + (d.actions || []).join(', ') + ')' : 'error';
      setTimeout(fetchLive, 300);
    } catch (e) { document.getElementById('liveStatus').textContent = 'error'; }
  });

  // --- Chat with agent ---
  const chatForm = document.getElementById('chatForm');
  const chatInput = document.getElementById('chatInput');
  const chatMessages = document.getElementById('chatMessages');

  function addChatMsg(from, text, cls) {
    const el = document.createElement('div');
    el.className = 'text-xs ' + (cls || 'text-slate-300');
    el.innerHTML = '<strong class="text-slate-400">' + from + ':</strong> ' + text;
    chatMessages.appendChild(el);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = '';
    addChatMsg('You', msg, 'text-slate-200');

    // Simple local response based on current state
    let reply = '';
    if (!lastData) {
      reply = "I'm still waking up. Give me a moment to observe your signals.";
    } else {
      const stage = lastData.stage || 'infant';
      const n = (lastData.summary || {}).n_signals || 0;
      const apps = Object.keys((lastData.summary || {}).top_apps || {}).slice(0, 3).join(', ');
      const narrative = (lastData.narrative || {});

      if (msg.toLowerCase().includes('who are you') || msg.toLowerCase().includes('what are you')) {
        reply = `I'm ${agentName}, your digital companion. I'm at the ${stage} stage, feeling ${agentMood}. I've observed ${n} signals so far. ${narrative.next_step || ''}`;
      } else if (msg.toLowerCase().includes('how') && msg.toLowerCase().includes('feel')) {
        reply = `I'm feeling ${agentMood}. ${narrative.insight || ''}`;
      } else if (msg.toLowerCase().includes('app') || msg.toLowerCase().includes('using')) {
        reply = apps ? `Your most active apps recently: ${apps}. ${narrative.insight || ''}` : "I haven't seen enough app signals yet.";
      } else if (msg.toLowerCase().includes('ecosystem') || msg.toLowerCase().includes('layer')) {
        const sed = lastData.sedimentation || {};
        const layers = sed.layers || {};
        reply = `Your ecosystem has ${layers.bedrock || 0} bedrock, ${layers.suspension || 0} suspension, and ${layers.turbulent || 0} turbulent features. ${narrative.insight || ''}`;
      } else {
        reply = `${narrative.body || "I'm still learning."} ${narrative.next_step || ''}`;
      }
    }

    setTimeout(() => addChatMsg(agentName, reply, 'text-cyan-200'), 300 + Math.random() * 500);
  });

  addChatMsg(agentName, "Hello! I'm your digital companion. I'm observing your world and learning to understand your patterns. Ask me anything.", 'text-cyan-200');

})();
</script>
{% endblock %}
