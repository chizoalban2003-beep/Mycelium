<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stem" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="280" r="200" fill="url(#glow)"/>
  <!-- Ground line -->
  <ellipse cx="256" cy="380" rx="100" ry="8" fill="#059669" opacity="0.3"/>
  <!-- Stem -->
  <path d="M256 380 Q256 320 256 260" stroke="url(#stem)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M256 300 Q210 260 200 210 Q240 240 256 270" fill="url(#leaf)" opacity="0.9"/>
  <!-- Right leaf -->
  <path d="M256 270 Q300 230 310 180 Q275 215 256 245" fill="url(#leaf)" opacity="0.85"/>
  <!-- Sprout tip -->
  <path d="M256 260 Q256 230 248 200 Q256 220 264 200 Q256 230 256 260" fill="#34d399" opacity="0.9"/>
  <!-- Data particles -->
  <circle cx="220" cy="340" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="290" cy="350" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="240" cy="360" r="2" fill="#059669" opacity="0.5"/>
  <circle cx="275" cy="330" r="3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="230" cy="310" r="2" fill="#34d399" opacity="0.5"/>
  <circle cx="280" cy="300" r="2.5" fill="#059669" opacity="0.4"/>
  <!-- Eyes on the sprout (personality) -->
  <circle cx="248" cy="238" r="4" fill="#22d3ee"/>
  <circle cx="264" cy="238" r="4" fill="#22d3ee"/>
  <circle cx="248" cy="237" r="1.5" fill="#ffffff"/>
  <circle cx="264" cy="237" r="1.5" fill="#ffffff"/>
</svg>
